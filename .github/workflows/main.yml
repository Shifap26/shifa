name: CI/CD Pipeline

on:
  push:
    branches:
      - main   # Trigger on every push

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout
      uses: actions/checkout@v3

    # 2. Set up Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    # 4. Run tests
    - name: Run Tests
      run: |
        pytest

    # 5. Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t my-ml-app .

    # 6. Run container (testing deployment)
    - name: Run Container
      run: |
        docker run -d -p 5000:5000 my-ml-app
